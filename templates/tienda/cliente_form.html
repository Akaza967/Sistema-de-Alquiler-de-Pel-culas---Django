{% extends "base.html" %}

{% block title %}Clientes - Formulario{% endblock %}

{% block content %}
    <div class="card">
        <h2 style="margin-top: 0">
            {% if form.instance.pk %}Editar cliente{% else %}Nuevo cliente{% endif %}
        </h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Guardar</button>
            <a class="btn secondary" href="{% url 'cliente_list' %}" style="margin-left: 8px">Cancelar</a>
        </form>
    </div>
{% endblock %}
