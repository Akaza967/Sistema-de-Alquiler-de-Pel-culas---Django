{% extends "base.html" %}

{% block title %}Nuevo alquiler{% endblock %}

{% block content %}
    <div class="card">
        <h2 style="margin-top: 0">Nuevo alquiler</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn" type="submit">Crear alquiler</button>
            <a class="btn secondary" href="{% url 'alquiler_list' %}" style="margin-left: 8px">Cancelar</a>
        </form>
        <p class="help" style="margin-bottom: 0; margin-top: 12px">
            Después podrás marcar el alquiler como pagado para que cuente como una venta.
        </p>
    </div>
{% endblock %}
